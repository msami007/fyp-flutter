android.useAndroidX=true
android.enableJetifier=true

# Disable Incremental Compilation to fix "Different Roots" errors (C: vs F:)
kotlin.incremental=false
kotlin.incremental.js=false
kotlin.incremental.multiplatform=false
kotlin.cache.backend.incremental=false

# JVM Optimization for Gradle Daemon stability
org.gradle.daemon=true
org.gradle.jvmargs=-Xmx6G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
